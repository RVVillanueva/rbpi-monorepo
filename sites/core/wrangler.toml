name = 'core'
main = 'dist/_worker.js'
compatibility_date = '2026-06-02'
compatibility_flags = ['nodejs_compat', 'experimental']

[assets]
directory = 'dist'
binding = 'ASSETS'

[[kv_namespaces]]
binding = "KV"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[observability]
enabled = true

[[hyperdrive]]
binding = "LEGACY"
id = ""

[[hyperdrive]]
binding = "CORE"
id = ""

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "core-media-files"

[dev]
port = 5000

[vars]
WORKER_ENV = 'production'

[env.development]
[env.development.vars]
WORKER_ENV = 'development'

[[env.development.kv_namespaces]]
binding = "KV"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[[env.development.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "core-media-files-dev"

[[env.development.hyperdrive]]
binding = "LEGACY"
id = ""

[[env.development.hyperdrive]]
binding = "CORE"
id = ""

[env.staging]
[env.staging.vars]
WORKER_ENV = 'staging'

[[env.staging.kv_namespaces]]
binding = "KV"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[[env.staging.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "core-media-files-staging"

[[env.staging.hyperdrive]]
binding = "LEGACY"
id = ""

[[env.staging.hyperdrive]]
binding = "CORE"
id = ""

[env.test]
[env.test.vars]
WORKER_ENV = 'test'

[[env.test.kv_namespaces]]
binding = "KV"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[[env.test.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "core-media-files-test"

[[env.test.hyperdrive]]
binding = "LEGACY"
id = ""

[[env.test.hyperdrive]]
binding = "CORE"
id = ""