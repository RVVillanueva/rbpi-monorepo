"$schema" = "./node_modules/wrangler/config-schema.json"
name = 'core'
main = './dist/server/index.js'
compatibility_date = '2026-04-27'
compatibility_flags = ['nodejs_compat']

[assets]
binding = 'ASSETS'
directory = './dist/client'
not_found_handling = 'none'

[[kv_namespaces]]
binding = "KV"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[observability]
enabled = true

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "core-media-files"

[dev]
port = 5000

[vars]
WORKER_ENV = 'production'

[env.development]
[env.development.vars]
WORKER_ENV = 'development'

[[env.development.kv_namespaces]]
binding = "KV"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[[env.development.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "core-media-files-dev"

[[env.development.hyperdrive]]
binding = "LEGACY"
id = ""

[[env.development.hyperdrive]]
binding = "CORE"
id = ""

[env.staging]
[env.staging.vars]
WORKER_ENV = 'staging'

[[env.staging.kv_namespaces]]
binding = "KV"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[[env.staging.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "core-media-files-staging"

[[env.staging.hyperdrive]]
binding = "LEGACY"
id = ""

[[env.staging.hyperdrive]]
binding = "CORE"
id = ""

[env.test]
[env.test.vars]
WORKER_ENV = 'test'

[[env.test.kv_namespaces]]
binding = "KV"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[[env.test.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "core-media-files-test"

[[env.test.hyperdrive]]
binding = "LEGACY"
id = ""

[[env.test.hyperdrive]]
binding = "CORE"
id = ""